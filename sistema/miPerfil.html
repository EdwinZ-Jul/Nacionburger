<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil</title>
    <link rel="stylesheet" href="/sistema/css/perfil.css">
</head>

<body>
    <div class="container">
        <section id="profile">
            <div class="profile-card">
                <div class="profile-header">
                    <img src="https://cdn-icons-png.flaticon.com/128/18851/18851104.png" alt="Foto de perfil del cliente"
                        class="profile-image">
                    <h1>Mi Perfil</h1>
                </div>
                <div class="profile-info">
                    <span class="info-label">Nombre Completo:</span>
                    <span id ="nombre" >[Nombre Apellido]</span>
                </div>
                <div class="profile-info">
                    <span class="info-label">DNI:</span>
                    <span id ="dni" >[DNI o Pasaporte]</span>
                </div>
                <div class="profile-info">
                    <span class="info-label">Teléfono:</span>
                    <span id ="telefono" >[Número]</span>
                </div>
                <div class="profile-info">
                    <span class="info-label">Email:</span>
                    <span id ="email">[correo@ejemplo.com]</span>
                </div>
            </div>
            <div class="return-button">
                <a href="pedido.html" class="btn">← Volver al Menú</a>
            </div>
        </section>
    </div>

    <script src="js/perfil.js" type="module"></script>
</body>

</html>
